<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>万年历 — 喵喵墨水屏</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body class="page-calendar">
<div class="wrap">
  <div class="hdr"><div><div class="title">万年历</div></div></div>
  <nav class="nav">
    <a href="/"><span class="msym sm">upload</span>上传</a>
    <a href="/gallery"><span class="msym sm">view_carousel</span>轮播</a>
    <a href="/weather"><span class="msym sm">cloud</span>天气</a>
    <a href="/clock"><span class="msym sm">schedule</span>时钟</a>
    <a href="/calendar" class="active"><span class="msym sm">calendar_month</span>日历</a>
    <a href="/timetable"><span class="msym sm">grid_on</span>课表</a>
    <a href="/todo"><span class="msym sm">check_box</span>待办</a>
    <a href="/countdown"><span class="msym sm">timer</span>倒计时</a>
    <a href="/message"><span class="msym sm">subject</span>文字</a>
    <a href="/board"><span class="msym sm">draw</span>画布</a>
    <a href="/codex"><span class="msym sm">monitoring</span>额度</a>
    <a href="/config"><span class="msym sm">settings</span>配置</a>
  </nav>
  <div class="card">
    <div class="hd"><div class="title">万年历</div></div>
    <div class="bd">
      <div class="form-grid">
        <div class="field-group"><label>年份</label><input type="number" id="calYear" min="1900" max="2100" placeholder="留空=当前年" style="max-width:140px"></div>
        <div class="field-group"><label>月份</label><input type="number" id="calMonth" min="1" max="12" placeholder="留空=当前月" style="max-width:140px"></div>
      </div>
      <div class="actions">
        <button class="btn" onclick="showCalendar()">显示万年历</button>
        <button class="btn ghost sm" onclick="showCalendarPrev()">上月</button>
        <button class="btn ghost sm" onclick="showCalendarNext()">下月</button>
      </div>
      <div class="log" id="calLog">就绪</div>
    </div>
  </div>
  <footer class="epd-credit">MiaooAim  <a href="https://github.com/bluseliu50/MiaooAim_fork" target="_blank" rel="noopener">源码</a><br>forked by bluseliu50</footer>
</div>
<script>
function epdAuthHeaders(){try{var u=localStorage.getItem('epd_auth_u');var p=localStorage.getItem('epd_auth_p');if(u!=null&&p!=null&&u!==''&&p!=='')return{'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};}catch(e){}return{};}
function epdFetchOpts(extra){extra=extra||{};var h=Object.assign({},epdAuthHeaders(),extra.headers||{});return Object.assign({},extra,{headers:h});}
function calLog(s,cls){const el=document.getElementById('calLog');el.className='log'+(cls?' '+cls:'');el.textContent=s;}
async function showCalendar(){const y=parseInt(document.getElementById('calYear').value)||0;const m=parseInt(document.getElementById('calMonth').value)||0;calLog('正在渲染万年历…请稍候（约 20 秒刷新）');try{const body={};if(y)body.year=y;if(m)body.month=m;const r=await fetch('/calendar_show',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}));const j=await r.json();if(j.ok)calLog('万年历已显示在墨水屏上！','ok');else calLog('显示失败','bad');}catch(e){calLog('请求失败: '+e,'bad');}}
function calStep(delta){let y=parseInt(document.getElementById('calYear').value)||new Date().getFullYear();let m=parseInt(document.getElementById('calMonth').value)||new Date().getMonth()+1;m+=delta;if(m>12){m=1;y++;}if(m<1){m=12;y--;}document.getElementById('calYear').value=y;document.getElementById('calMonth').value=m;showCalendar();}
function showCalendarPrev(){calStep(-1);}function showCalendarNext(){calStep(1);}
(function(){const d=new Date();document.getElementById('calYear').value=d.getFullYear();document.getElementById('calMonth').value=d.getMonth()+1;})();
</script>
</body>
</html>
