<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codex 额度 — 喵喵墨水屏</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body class="codex">
<div class="wrap">
  <div class="hdr"><div><div class="title">Codex 额度</div></div></div>
  <nav class="nav">
    <a href="/"><span class="msym sm">upload</span>上传</a>
    <a href="/gallery"><span class="msym sm">view_carousel</span>轮播</a>
    <a href="/weather"><span class="msym sm">cloud</span>天气</a>
    <a href="/clock"><span class="msym sm">schedule</span>时钟</a>
    <a href="/calendar"><span class="msym sm">calendar_month</span>日历</a>
    <a href="/timetable"><span class="msym sm">grid_on</span>课表</a>
    <a href="/todo"><span class="msym sm">check_box</span>待办</a>
    <a href="/countdown"><span class="msym sm">timer</span>倒计时</a>
    <a href="/message"><span class="msym sm">subject</span>文字</a>
    <a href="/board"><span class="msym sm">draw</span>画布</a>
    <a href="/codex" class="active"><span class="msym sm">monitoring</span>额度</a>
    <a href="/config"><span class="msym sm">settings</span>配置</a>
  </nav>
  <div class="card">
    <div class="hd"><div class="title">Codex 额度</div></div>
    <div class="bd">
      <div class="kv"><div class="k">额度状态</div><div class="v" id="cq_status">-</div><div class="k">最新数据</div><div class="v" id="cq_data">-</div></div>
      <div class="form-row"><label>启用额度页</label>
        <label class="inline"><span class="toggle"><input type="checkbox" id="cqEnabled"><span class="sl"></span></span><span id="cqLabel">已关闭</span></label>
      </div>
      <div class="field-group"><label>额度 API URL</label><input type="text" id="cqApiUrl" placeholder="https://dash.classicriver.cn/v1/usage"></div>
      <div class="field-group"><label>API Key</label><input type="password" id="cqApiKey" placeholder="sk-..."></div>
      <div class="field-group"><label>显示单位</label><input type="text" id="cqUnit" placeholder="USD / 元 / credits"></div>
      <div class="field-group"><label>自动刷新</label><select id="cqRefresh"><option value="0">仅手动刷新</option><option value="5">自动：每 5 分钟</option><option value="15">自动：每 15 分钟</option><option value="30">自动：每 30 分钟</option></select></div>
      <div class="actions">
        <button class="btn" onclick="saveCodexQuota()">保存设置</button>
        <button class="btn ghost sm" onclick="showCodexQuota()">立即显示</button>
        <button class="btn ghost sm" onclick="loadCodexQuota()">刷新</button>
      </div>
      <div class="log" id="cqLog">加载中…</div>
    </div>
  </div>
  <footer class="epd-credit">MiaooAim  <a href="https://github.com/bluseliu50/MiaooAim_fork" target="_blank" rel="noopener">源码</a><br>forked by bluseliu50</footer>
</div>
<script>
function epdAuthHeaders(){try{var u=localStorage.getItem('epd_auth_u');var p=localStorage.getItem('epd_auth_p');if(u!=null&&p!=null&&u!==''&&p!=='')return {'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};}catch(e){}return {};}
function epdFetchOpts(extra){extra=extra||{};var h=Object.assign({},epdAuthHeaders(),extra.headers||{});return Object.assign({},extra,{headers:h});}

function cqLog(s,cls){const el=document.getElementById('cqLog');el.className='log'+(cls?' '+cls:'');el.textContent=s;}var codexQuotaKeyConfigured=false;
function normalizeCodexQuotaUrl(url){url=(url||'').trim();if(!url) return '';if(url.indexOf('/v1/usage')>=0) return url;url=url.replace(/\/api\/usage\/token\/?$/,'').replace(/\/api\/user\/self\/?$/,'');url=url.replace(/\/+$/,'');if(url.endsWith('/v1')) return url+'/usage';return url+'/v1/usage';}
function collectCodexQuotaCfg(){var cfg={enabled:document.getElementById('cqEnabled').checked,api_url:normalizeCodexQuotaUrl(document.getElementById('cqApiUrl').value),api_key:document.getElementById('cqApiKey').value.trim(),unit:document.getElementById('cqUnit').value.trim()||'USD',refresh_min:parseInt(document.getElementById('cqRefresh').value,10)||0};document.getElementById('cqApiUrl').value=cfg.api_url;if(!cfg.api_key&&codexQuotaKeyConfigured) delete cfg.api_key;return cfg;}
function formatQuotaAmount(v,unit){if(v===undefined||v===null||isNaN(Number(v))) return '--';var n=Number(v);var s=Math.abs(n)>=1000?String(Math.round(n)):n.toFixed(2);return s+' '+(unit||'');}
async function loadCodexQuota(){try{const r=await fetch('/codex_quota_config',epdFetchOpts());const j=await r.json();codexQuotaKeyConfigured=!!j.api_key_set;document.getElementById('cqEnabled').checked=!!j.enabled;document.getElementById('cqLabel').textContent=j.enabled?'已开启':'已关闭';document.getElementById('cqApiUrl').value=j.api_url||'';document.getElementById('cqApiKey').value=j.api_key||'';document.getElementById('cqApiKey').placeholder=codexQuotaKeyConfigured?'已保存，留空不修改':'中转站 API Key';document.getElementById('cqUnit').value=j.unit||'USD';document.getElementById('cqRefresh').value=String(j.refresh_min===undefined?5:j.refresh_min);const st=document.getElementById('cq_status');if(j.enabled){st.textContent=(j.refresh_min?('运行中，每 '+j.refresh_min+' 分钟自动刷新'):'运行中，手动刷新');st.className='v ok';}else{st.textContent='已关闭';st.className='v warn';}const data=document.getElementById('cq_data');if(j.has_data){data.textContent='剩余 '+formatQuotaAmount(j.remaining,j.unit)+'，已用 '+(j.percent_used||0)+'% ('+(j.update_time||'--')+')';data.className='v';}else{data.textContent='暂无数据';data.className='v warn';}cqLog('设置已加载。');}catch(e){cqLog('加载失败: '+e,'bad');}}
async function saveCodexQuota(){var cfg=collectCodexQuotaCfg();if(cfg.enabled&&(!cfg.api_url||!(cfg.api_key||codexQuotaKeyConfigured))){cqLog('请填写额度 API URL 和 API Key','bad');return;}cqLog('保存中…');try{const r=await fetch('/codex_quota_config',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)}));const j=await r.json();if(j.ok){cqLog('设置已保存。开启自动刷新后，停留在“额度”模式会按间隔刷新。','ok');await loadCodexQuota();}else cqLog('保存失败','bad');}catch(e){cqLog('请求失败: '+e,'bad');}}
async function showCodexQuota(){cqLog('正在请求额度接口并渲染…墨水屏较慢，请耐心等待');var ctrl=new AbortController();var t=setTimeout(function(){ctrl.abort();},120000);try{const r=await fetch('/codex_quota_show',epdFetchOpts({method:'POST',signal:ctrl.signal}));const j=await r.json();if(j.ok){cqLog('额度已显示在墨水屏上！','ok');await loadCodexQuota();}else cqLog('额度获取失败，请检查 API URL、Key 和接口返回字段。','bad');}catch(e){cqLog('请求失败: '+(e.name==='AbortError'?'超时（墨水屏仍在刷新可稍后再试）':e),'bad');}finally{clearTimeout(t);}}
(function(){var ce=document.getElementById('cqEnabled');if(ce)ce.addEventListener('change',function(e){document.getElementById('cqLabel').textContent=e.target.checked?'已开启':'已关闭';});})();
loadCodexQuota();
</script>
</body>
</html>
