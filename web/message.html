<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>文字留言 — 喵喵墨水屏</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body class="message">
<div class="wrap">
  <div class="hdr"><div><div class="title">文字留言板</div></div></div>
  <nav class="nav">
    <a href="/"><span class="msym sm">upload</span>上传</a>
    <a href="/gallery"><span class="msym sm">view_carousel</span>轮播</a>
    <a href="/weather"><span class="msym sm">cloud</span>天气</a>
    <a href="/clock"><span class="msym sm">schedule</span>时钟</a>
    <a href="/calendar"><span class="msym sm">calendar_month</span>日历</a>
    <a href="/timetable"><span class="msym sm">grid_on</span>课表</a>
    <a href="/todo"><span class="msym sm">check_box</span>待办</a>
    <a href="/countdown"><span class="msym sm">timer</span>倒数日</a>
    <a href="/message" class="active"><span class="msym sm">subject</span>文字</a>
    <a href="/board"><span class="msym sm">draw</span>画布</a>
    <a href="/codex"><span class="msym sm">monitoring</span>额度</a>
    <a href="/config"><span class="msym sm">settings</span>配置</a>
  </nav>
  <div class="card"><div class="hd"><div class="title">文字留言板</div></div><div class="bd">
    <div class="msg-workbench">
      <section class="msg-panel" aria-label="留言内容">
        <div style="margin-bottom:10px"><span class="msg-panel-title">内容</span></div>
        <div class="form-row msg-text-row"><label>留言内容</label><textarea id="msgText" rows="7" maxlength="500" placeholder="在此输入要显示的文字…"></textarea></div>
        <div class="msg-primary-grid">
          <div class="form-row"><label>字体</label><select id="webFontFamily">
            <option value="SimSun, STSong, Songti SC, serif">宋体 / 明体</option>
            <option value="NSimSun, SimSun, STSong, serif">新宋体</option>
            <option value="STZhongsong, 华文中宋, SimSun, serif">华文中宋</option>
            <option value="FangSong, STFangsong, 仿宋, serif">仿宋</option>
            <option value="KaiTi, STKaiti, Kaiti SC, 楷体, serif">楷体</option>
            <option value="SimHei, STXihei, Heiti SC, Microsoft YaHei, sans-serif">黑体</option>
            <option value="Microsoft YaHei UI, Microsoft YaHei, sans-serif">微软雅黑</option>
            <option value="LXGW 975 Yuan SC, 霞鹜975圆体 SC, Microsoft YaHei UI, sans-serif">圆体</option>
            <option value="STXingkai, 华文行楷, Xingkai SC, KaiTi, serif">华文行楷 / 书法</option>
            <option value="STXinwei, 华文新魏, Weibei SC, KaiTi, serif">华文新魏</option>
            <option value="STLiti, LiSu, 隶书, serif">隶书</option>
            <option value="FZShuTi, 方正舒体, STXingkai, KaiTi, serif">舒体</option>
            <option value="FZYaoti, 方正姚体, STXinwei, KaiTi, serif">姚体</option>
            <option value="Hannotate SC, Wawati SC, Yuppy SC, Kaiti SC, serif">手写风格</option>
            <option value="YouYuan, 幼圆, Microsoft YaHei UI, sans-serif">幼圆</option>
          </select></div>
          <div class="form-row"><label>字号</label><input type="number" id="webFontPx" value="48" min="12" max="180"></div>
          <div class="form-row"><label>颜色</label><select id="webColor"><option value="black">黑色</option><option value="red">红色</option></select></div>
        </div>
        <div class="msg-main-actions">
          <button class="btn" id="webShowBtn" onclick="showWebRenderedMsg()">发送到墨水屏</button>
          <button class="btn ghost sm" onclick="renderWebMessage()">刷新预览</button>
        </div>
        <details class="msg-advanced">
          <summary>更多设置</summary>
          <div class="msg-advanced-body">
            <div class="msg-field-grid">
              <div class="form-row"><label>自定义字体名</label><input type="text" id="webCustomFont" placeholder="例如：汉仪尚巍手书"></div>
              <div class="form-row"><label>字重</label><select id="webFontWeight"><option value="400">常规</option><option value="600">半粗</option><option value="700">粗体</option><option value="900">特粗</option></select></div>
              <div class="form-row"><label>对齐</label><select id="msgAlign"><option value="0">左对齐</option><option value="1">居中</option></select></div>
              <div class="form-row"><label>行距</label><input type="number" id="webLineHeight" value="1.18" min="0.8" max="2" step="0.05"></div>
              <div class="form-row"><label>边距</label><input type="number" id="webMargin" value="20" min="0" max="120"></div>
              <div class="form-row"><label>垂直位置</label><select id="webVAlign"><option value="center">居中</option><option value="top">靠上</option><option value="bottom">靠下</option></select></div>
              <div class="form-row"><label>X 偏移</label><input type="number" id="msgXOff" value="0" min="-200" max="200"></div>
              <div class="form-row"><label>Y 偏移</label><input type="number" id="msgYOff" value="0" min="-150" max="150"></div>
              <div class="form-row"><label>抗锯齿阈值</label><input type="range" id="webThreshold" min="80" max="220" value="170"></div>
            </div>
            <details>
              <summary>固件字库兼容模式</summary>
              <div class="msg-field-grid" style="margin-top:12px">
                <div class="form-row"><label>固件字号</label><select id="msgFont"><option value="0">1x 标准 (16px)</option><option value="1">2x 中号 (32px)</option><option value="2">3x 大号 (48px)</option><option value="3">4x 超大 (64px)</option><option value="4">5x 巨大 (80px)</option></select></div>
                <div class="form-row"><label>固件颜色</label><select id="msgColor"><option value="0">黑色</option><option value="1">红色</option></select></div>
              </div>
              <div class="msg-actions" style="margin-top:12px"><button class="btn ghost" onclick="saveMsg()">保存固件文字设置</button><button class="btn ghost sm" onclick="showMsg()">固件字库显示</button><button class="btn ghost sm" onclick="loadMsg()">刷新</button></div>
            </details>
          </div>
        </details>
      </section>
      <section class="web-font-panel msg-panel" aria-label="网页字体渲染">
        <div class="web-font-head">
          <b>效果预览</b>
          <div class="web-font-meta" id="webFontMeta">400×300</div>
        </div>
        <div class="web-font-grid">
          <div class="web-font-preview"><canvas id="webMsgCanvas" width="400" height="300"></canvas></div>
        </div>
      </section>
    </div>
    <div class="log" id="msgLog">加载中…</div>
  </div></div>
  <footer class="epd-credit">MiaooAim  <a href="https://github.com/bluseliu50/MiaooAim_fork" target="_blank" rel="noopener">源码</a><br>forked by bluseliu50</footer>
</div>
<script>
function epdAuthHeaders(){try{var u=localStorage.getItem('epd_auth_u');var p=localStorage.getItem('epd_auth_p');if(u!=null&&p!=null&&u!==''&&p!=='')return {'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};}catch(e){}return {};}
function epdFetchOpts(extra){extra=extra||{};var h=Object.assign({},epdAuthHeaders(),extra.headers||{});return Object.assign({},extra,{headers:h});}

function msgLog(s,cls){const el=document.getElementById('msgLog');el.className='log'+(cls?' '+cls:'');el.textContent=s;}
let epdPanelW=400,epdPanelH=300,epdPanelHasRed=true;
function syncCanvasSize(){const c=document.getElementById('webMsgCanvas');if(!c)return;c.width=epdPanelW;c.height=epdPanelH;const meta=document.getElementById('webFontMeta');if(meta)meta.textContent=epdPanelW+'×'+epdPanelH+(epdPanelHasRed?' / 三色':' / 黑白');}
function cssFontFamily(){const custom=(document.getElementById('webCustomFont').value||'').trim();if(custom)return '"'+custom.replace(/"/g,'')+'", '+(document.getElementById('webFontFamily').value||'serif');return document.getElementById('webFontFamily').value||'serif';}
function wrapCanvasText(ctx,text,maxW){const out=[];String(text||'').split(/\n/).forEach(part=>{let line='';for(const ch of part){const next=line+ch;if(ctx.measureText(next).width>maxW&&line){out.push(line);line=ch;}else line=next;}out.push(line);});return out;}
function quantizeWebCanvas(c,colorMode,threshold){const ctx=c.getContext('2d');const im=ctx.getImageData(0,0,c.width,c.height);const d=im.data;for(let i=0;i<d.length;i+=4){const a=d[i+3];const gray=(d[i]*30+d[i+1]*59+d[i+2]*11)/100;const on=a>16&&gray<threshold;if(on){if(colorMode==='red'&&epdPanelHasRed){d[i]=192;d[i+1]=57;d[i+2]=43;}else{d[i]=d[i+1]=d[i+2]=0;}d[i+3]=255;}else{d[i]=d[i+1]=d[i+2]=255;d[i+3]=255;}}ctx.putImageData(im,0,0);}
function renderWebMessage(){const c=document.getElementById('webMsgCanvas');if(!c)return;syncCanvasSize();const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);const text=document.getElementById('msgText').value||'在此输入要显示的文字…';const px=Math.max(12,Math.min(180,parseInt(document.getElementById('webFontPx').value,10)||48));const lhMul=parseFloat(document.getElementById('webLineHeight').value)||1.18;const lineH=Math.max(px,Math.round(px*lhMul));const margin=Math.max(0,Math.min(120,parseInt(document.getElementById('webMargin').value,10)||20));const align=parseInt(document.getElementById('msgAlign').value,10)||0;const xoff=parseInt(document.getElementById('msgXOff').value,10)||0;const yoff=parseInt(document.getElementById('msgYOff').value,10)||0;const weight=document.getElementById('webFontWeight').value||'400';ctx.font=weight+' '+px+'px '+cssFontFamily();ctx.textBaseline='top';ctx.fillStyle=document.getElementById('webColor').value==='red'&&epdPanelHasRed?'#c0392b':'#000';ctx.textAlign=align===1?'center':'left';const maxW=Math.max(10,c.width-margin*2);const lines=wrapCanvasText(ctx,text,maxW);const totalH=lines.length*lineH;const valign=document.getElementById('webVAlign').value;let y=margin;if(valign==='center')y=Math.round((c.height-totalH)/2);else if(valign==='bottom')y=c.height-margin-totalH;y+=yoff;const x=align===1?Math.round(c.width/2)+xoff:margin+xoff;for(const line of lines){ctx.fillText(line,x,y);y+=lineH;}quantizeWebCanvas(c,document.getElementById('webColor').value,parseInt(document.getElementById('webThreshold').value,10)||170);}
function webCanvasBlob(){return new Promise((resolve,reject)=>{renderWebMessage();const c=document.getElementById('webMsgCanvas');c.toBlob(b=>b?resolve(b):reject('preview export failed'),'image/png');});}
async function showWebRenderedMsg(){const text=document.getElementById('msgText').value;if(!text.trim()){msgLog('请先输入留言内容','bad');return;}const btn=document.getElementById('webShowBtn');if(btn)btn.disabled=true;msgLog('正在用网页字体渲染图片并发送到墨水屏，请稍候…');try{const blob=await webCanvasBlob();const r=await fetch('/msg_image_show',epdFetchOpts({method:'POST',headers:{'Content-Type':'image/png'},body:blob}));const t=await r.text();msgLog(r.ok?'网页字体图片已发送到墨水屏。':'发送失败：'+t,r.ok?'ok':'bad');}catch(e){msgLog('网页字体渲染失败: '+e,'bad');}finally{if(btn)btn.disabled=false;}}
['msgText','msgAlign','msgXOff','msgYOff','webFontFamily','webCustomFont','webFontPx','webFontWeight','webLineHeight','webMargin','webVAlign','webColor','webThreshold'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener((el.tagName==='SELECT')?'change':'input',renderWebMessage);});
async function loadStatusForPreview(){try{const r=await fetch('/status',epdFetchOpts());const j=await r.json();if(j.panel_width&&j.panel_height){epdPanelW=j.panel_width;epdPanelH=j.panel_height;}epdPanelHasRed=!!j.panel_has_red;syncCanvasSize();renderWebMessage();}catch(e){syncCanvasSize();renderWebMessage();}}
async function loadMsg(){try{const r=await fetch('/msg_config',epdFetchOpts());const j=await r.json();document.getElementById('msgText').value=j.text||'';document.getElementById('msgFont').value=String(j.font_size||0);document.getElementById('msgAlign').value=String(j.align||0);document.getElementById('msgColor').value=String(j.color||0);document.getElementById('webColor').value=(j.color==1&&epdPanelHasRed)?'red':'black';document.getElementById('msgXOff').value=j.x_offset||0;document.getElementById('msgYOff').value=j.y_offset||0;renderWebMessage();msgLog('设置已加载。');}catch(e){renderWebMessage();msgLog('加载失败: '+e,'bad');}}
async function saveMsg(){const text=document.getElementById('msgText').value;if(text.length>500){msgLog('文字过长，最多 500 字符','bad');return false;}const cfg={text:text,font_size:parseInt(document.getElementById('msgFont').value),align:parseInt(document.getElementById('msgAlign').value),color:parseInt(document.getElementById('msgColor').value),x_offset:parseInt(document.getElementById('msgXOff').value)||0,y_offset:parseInt(document.getElementById('msgYOff').value)||0};msgLog('保存中…');try{const r=await fetch('/msg_config',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)}));const j=await r.json();if(j.ok){msgLog('设置已保存。','ok');await loadMsg();return true;}msgLog('保存失败','bad');}catch(e){msgLog('请求失败: '+e,'bad');}return false;}
async function showMsg(){const text=document.getElementById('msgText').value;if(!text.trim()){msgLog('请先输入留言内容','bad');return;}if(!(await saveMsg())) return;msgLog('正在渲染…请稍候（约 15 秒刷新）');try{const r=await fetch('/msg_show',epdFetchOpts({method:'POST'}));const j=await r.json();if(j.ok) msgLog('留言已显示在墨水屏上！','ok');else msgLog('显示失败，请确保已输入文字内容。','bad');}catch(e){msgLog('请求失败: '+e,'bad');}}
loadStatusForPreview().then(loadMsg);
</script>
</body>
</html>
