<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>轮播 — 喵喵墨水屏</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body class="page-gallery">
<div class="wrap">
  <div class="hdr"><div><div class="title">轮播设置</div></div></div>
  <nav class="nav">
    <a href="/"><span class="msym sm">upload</span>上传</a>
    <a href="/gallery" class="active"><span class="msym sm">view_carousel</span>轮播</a>
    <a href="/weather"><span class="msym sm">cloud</span>天气</a>
    <a href="/clock"><span class="msym sm">schedule</span>时钟</a>
    <a href="/calendar"><span class="msym sm">calendar_month</span>日历</a>
    <a href="/timetable"><span class="msym sm">grid_on</span>课表</a>
    <a href="/todo"><span class="msym sm">check_box</span>待办</a>
    <a href="/countdown"><span class="msym sm">timer</span>倒计时</a>
    <a href="/message"><span class="msym sm">subject</span>文字</a>
    <a href="/board"><span class="msym sm">draw</span>画布</a>
    <a href="/codex"><span class="msym sm">monitoring</span>额度</a>
    <a href="/config"><span class="msym sm">settings</span>配置</a>
  </nav>
  <div class="card">
    <div class="hd"><div class="title">定时轮播</div></div>
    <div class="bd">
      <div class="kv"><div class="k">轮播状态</div><div class="v" id="ss_status">-</div><div class="k">当前图片</div><div class="v" id="ss_current">-</div></div>
      <div class="form-row"><label>启用轮播</label>
        <label class="inline"><span class="toggle"><input type="checkbox" id="ssEnabled"><span class="sl"></span></span><span id="ssLabel">已关闭</span></label>
      </div>
      <div class="field-group"><label>轮播间隔</label><select id="ssInterval"><option value="300">5 分钟</option><option value="600">10 分钟</option><option value="900">15 分钟</option><option value="1800">30 分钟</option><option value="3600">1 小时</option><option value="7200">2 小时</option><option value="14400">4 小时</option><option value="28800">8 小时</option><option value="43200">12 小时</option><option value="86400">24 小时</option></select></div>
      <div class="field-group"><label>轮播模式</label><select id="ssMode"><option value="0">顺序播放</option><option value="1">随机播放</option></select></div>
      <div class="form-row"><label>图片叠加时钟</label>
        <label class="inline"><span class="toggle"><input type="checkbox" id="ssClkOverlay"><span class="sl"></span></span><span style="color:var(--t2);font-size:12px">在图片右上角显示当前时间</span></label>
      </div>
      <div class="actions">
        <button class="btn" onclick="saveSlideshow()">保存设置</button>
        <button class="btn ghost sm" onclick="loadSlideshow()">刷新</button>
        <a class="btn ghost sm" href="/">管理图片</a>
      </div>
      <div class="log" id="ssLog">加载中…</div>
    </div>
  </div>
  <footer class="epd-credit">MiaooAim  <a href="https://github.com/bluseliu50/MiaooAim_fork" target="_blank" rel="noopener">源码</a><br>forked by bluseliu50</footer>
</div>
<script>
function epdAuthHeaders(){try{var u=localStorage.getItem('epd_auth_u');var p=localStorage.getItem('epd_auth_p');if(u!=null&&p!=null&&u!==''&&p!=='')return{'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};}catch(e){}return{};}
function epdFetchOpts(extra){extra=extra||{};var h=Object.assign({},epdAuthHeaders(),extra.headers||{});return Object.assign({},extra,{headers:h});}
function ssLog(s,cls){const el=document.getElementById('ssLog');el.className='log'+(cls?' '+cls:'');el.textContent=s;}
function formatInterval(sec){if(sec>=3600)return(sec/3600)+'小时';return(sec/60)+'分钟';}
async function loadSlideshow(){try{const r=await fetch('/slideshow',epdFetchOpts());const j=await r.json();document.getElementById('ssEnabled').checked=j.enabled;document.getElementById('ssLabel').textContent=j.enabled?'已开启':'已关闭';document.getElementById('ssInterval').value=String(j.interval_sec||900);document.getElementById('ssMode').value=String(j.mode||0);document.getElementById('ssClkOverlay').checked=!!j.clock_overlay;const st=document.getElementById('ss_status');if(j.enabled){st.textContent='运行中，每 '+formatInterval(j.interval_sec)+' 切换';st.className='v ok';}else{st.textContent='已关闭';st.className='v warn';}document.getElementById('ss_current').textContent=j.current_image||'暂无';ssLog('设置已加载。');}catch(e){ssLog('加载失败: '+e,'bad');}}
async function saveSlideshow(){const cfg={enabled:document.getElementById('ssEnabled').checked,interval_sec:parseInt(document.getElementById('ssInterval').value),mode:parseInt(document.getElementById('ssMode').value),clock_overlay:document.getElementById('ssClkOverlay').checked};ssLog('保存中…');try{const r=await fetch('/slideshow',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)}));const j=await r.json();if(j.ok){ssLog('设置已保存！'+(cfg.enabled?'轮播将在 '+formatInterval(cfg.interval_sec)+' 后显示下一张。':'轮播已关闭。'),'ok');await loadSlideshow();}else ssLog('保存失败','bad');}catch(e){ssLog('请求失败: '+e,'bad');}}
(function(){var ss=document.getElementById('ssEnabled');if(ss)ss.addEventListener('change',function(e){document.getElementById('ssLabel').textContent=e.target.checked?'已开启':'已关闭';});})();
loadSlideshow();
</script>
</body>
</html>
