<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>倒数日 — 喵喵墨水屏</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body class="countdown">
<div class="wrap">
  <div class="hdr"><div><div class="title">倒数日</div></div></div>
  <nav class="nav">
    <a href="/"><span class="msym sm">upload</span>上传</a>
    <a href="/gallery"><span class="msym sm">view_carousel</span>轮播</a>
    <a href="/weather"><span class="msym sm">cloud</span>天气</a>
    <a href="/clock"><span class="msym sm">schedule</span>时钟</a>
    <a href="/calendar"><span class="msym sm">calendar_month</span>日历</a>
    <a href="/timetable"><span class="msym sm">grid_on</span>课表</a>
    <a href="/todo"><span class="msym sm">check_box</span>待办</a>
    <a href="/countdown" class="active"><span class="msym sm">timer</span>倒数日</a>
    <a href="/message"><span class="msym sm">subject</span>文字</a>
    <a href="/board"><span class="msym sm">draw</span>画布</a>
    <a href="/codex"><span class="msym sm">monitoring</span>额度</a>
    <a href="/config"><span class="msym sm">settings</span>配置</a>
  </nav>
  <div class="card">
    <div class="hd" style="display:flex;justify-content:space-between;align-items:center">
      <label class="inline"><span class="toggle"><input type="checkbox" id="chkEnabled"><span class="sl"></span></span><span class="title" style="font-size:14px">启用倒数日</span></label>
      <span class="sub" id="cntHint"></span>
    </div>
    <div class="bd">
      <p class="sub" style="margin:0 0 12px">最多 3 条，标题不超过 47 字。仅「启用」的条目会参与显示。</p>
      <div id="list"></div>
      <div class="actions" style="margin-top:6px;margin-bottom:0">
        <button type="button" class="btn sm ghost" id="btnAdd" onclick="addItem()">+ 添加条目</button>
      </div>
    </div>
  </div>
  <div class="actions">
    <button type="button" class="btn" onclick="saveConfig()">保存配置</button>
    <button type="button" class="btn ghost" onclick="showOnEpd()">显示到墨水屏</button>
    <button type="button" class="btn ghost" onclick="loadConfig()">重新加载</button>
  </div>
  <div class="log" id="logBox">就绪。</div>
  <footer class="epd-credit">MiaooAim  <a href="https://github.com/bluseliu50/MiaooAim_fork" target="_blank" rel="noopener">源码</a><br>forked by bluseliu50</footer>
</div>
<script>
function epdAuthHeaders(){
  try{
    var u=localStorage.getItem('epd_auth_u');
    var p=localStorage.getItem('epd_auth_p');
    if(u!=null&&p!=null&&u!==''&&p!=='')
      return {'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};
  }catch(e){}
  return {};
}
function epdFetchOpts(extra){
  extra=extra||{};
  var h=Object.assign({},epdAuthHeaders(),extra.headers||{});
  return Object.assign({},extra,{headers:h});
}
const MAX=3;
let items=[];

function pad2(n){return String(n).padStart(2,'0')}
function ymdStr(it){return it.year+'-'+pad2(it.month)+'-'+pad2(it.day)}
function todayParts(){const d=new Date();return{year:d.getFullYear(),month:d.getMonth()+1,day:d.getDate()}}
function log(msg,cls){
  const b=document.getElementById('logBox');
  b.textContent=msg;
  b.className='log'+(cls?' '+cls:'');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}
function updateHint(){
  document.getElementById('cntHint').textContent=items.length+' / '+MAX+' 条';
  document.getElementById('btnAdd').disabled=items.length>=MAX;
}
function renderList(){
  const el=document.getElementById('list');
  if(items.length===0){
    el.innerHTML='<div class="sub">暂无条目，请点击「添加条目」。</div>';
    updateHint();
    return;
  }
  el.innerHTML=items.map((it,i)=>`
    <div class="cd-row">
      <input type="text" class="cd-title" maxlength="47" placeholder="标题" value="${esc(it.title)}"
        oninput="items[${i}].title=this.value.slice(0,47)">
      <span class="cd-lbl">目标日期</span>
      <input type="date" class="cd-date" value="${esc(ymdStr(it))}" onchange="onDateCh(${i},this.value)">
      <label class="toggle"><input type="checkbox" class="cd-act" ${it.active?'checked':''} onchange="items[${i}].active=this.checked"><span class="track"></span></label>
      <span class="cd-lbl">启用</span>
      <span class="cd-del" onclick="removeItem(${i})" title="删除">×</span>
    </div>`).join('');
  updateHint();
}
function onDateCh(i,s){
  if(!s)return;
  const p=s.split('-').map(Number);
  if(p.length===3){items[i].year=p[0];items[i].month=p[1];items[i].day=p[2]}
}
function addItem(){
  if(items.length>=MAX){log('已达上限（'+MAX+' 条）','bad');return}
  const t=todayParts();
  items.push({title:'',year:t.year,month:t.month,day:t.day,active:true});
  renderList();
}
function removeItem(i){
  items.splice(i,1);
  renderList();
}
function buildPayload(){
  const enabled=document.getElementById('chkEnabled').checked;
  const clean=items.map(it=>({
    title:(it.title||'').slice(0,47),
    year:+it.year||2000,
    month:+it.month||1,
    day:+it.day||1,
    active:!!it.active
  }));
  return{enabled,count:clean.length,items:clean};
}
async function loadConfig(){
  try{
    const r=await fetch('/countdown_config',epdFetchOpts({}));
    const j=await r.json();
    document.getElementById('chkEnabled').checked=!!j.enabled;
    items=Array.isArray(j.items)?j.items.slice(0,MAX):[];
    items=items.map(it=>({
      title:String(it.title||'').slice(0,47),
      year:+it.year||todayParts().year,
      month:+it.month||1,
      day:+it.day||1,
      active:it.active!==false
    }));
    renderList();
    log('配置已加载','ok');
  }catch(e){
    items=[];
    renderList();
    log('加载失败：'+e,'bad');
  }
}
async function saveConfig(){
  const body=JSON.stringify(buildPayload());
  try{
    const r=await fetch('/countdown_config',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body}));
    const j=await r.json().catch(()=>({}));
    const ok=r.ok&&(j.ok!==false);
    log(ok?'保存成功。':('保存失败'+(j.msg?': '+j.msg:'')),ok?'ok':'bad');
  }catch(e){log('保存失败：'+e,'bad')}
}
async function showOnEpd(){
  log('正在显示到墨水屏…');
  try{
    const r=await fetch('/countdown_show',epdFetchOpts({method:'POST'}));
    const j=await r.json().catch(()=>({}));
    const ok=r.ok&&(j.ok!==false);
    log(ok?'已触发显示。':('显示失败'+(j.msg?': '+j.msg:'')),ok?'ok':'bad');
  }catch(e){log('请求失败：'+e,'bad')}
}
loadConfig();
</script>
</body>
</html>
