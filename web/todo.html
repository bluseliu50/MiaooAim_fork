<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>待办事项 — 喵喵墨水屏</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body class="todo">
<div class="wrap">
  <div class="hdr"><div><div class="title">待办事项</div></div></div>
  <nav class="nav">
    <a href="/"><span class="msym sm">upload</span>上传</a>
    <a href="/gallery"><span class="msym sm">view_carousel</span>轮播</a>
    <a href="/weather"><span class="msym sm">cloud</span>天气</a>
    <a href="/clock"><span class="msym sm">schedule</span>时钟</a>
    <a href="/calendar"><span class="msym sm">calendar_month</span>日历</a>
    <a href="/timetable"><span class="msym sm">grid_on</span>课表</a>
    <a href="/todo" class="active"><span class="msym sm">check_box</span>待办</a>
    <a href="/countdown"><span class="msym sm">timer</span>倒计时</a>
    <a href="/message"><span class="msym sm">subject</span>文字</a>
    <a href="/board"><span class="msym sm">draw</span>画布</a>
    <a href="/codex"><span class="msym sm">monitoring</span>额度</a>
    <a href="/config"><span class="msym sm">settings</span>配置</a>
  </nav>
  <div class="card">
    <div class="hd" style="display:flex;justify-content:space-between;align-items:center">
      <label class="inline"><span class="toggle"><input type="checkbox" id="chkEnabled"><span class="sl"></span></span><span class="title" style="font-size:14px">启用待办显示</span></label>
      <span class="sub" id="stat"></span>
    </div>
    <div style="padding:0 20px 6px"><div class="bar-wrap" style="margin-top:0"><div id="progBar" class="bar-fill" style="width:0%"></div></div></div>
    <div class="bd" style="padding:0">
      <div id="list"></div>
      <div class="add-row">
        <input type="text" id="newText" placeholder="添加新待办…" maxlength="47">
        <button class="btn sm" onclick="addItem()">添加</button>
      </div>
    </div>
  </div>
  <div class="actions">
    <button class="btn" onclick="save()">保存</button>
    <button class="btn ghost" onclick="showOnEpd()">推送到屏幕</button>
    <button class="btn ghost" onclick="clearDone()">清除已完成</button>
  </div>
  <div class="log" id="logBox"></div>
  <footer class="epd-credit">MiaooAim  <a href="https://github.com/bluseliu50/MiaooAim_fork" target="_blank" rel="noopener">源码</a><br>forked by bluseliu50</footer>
</div>
<script>
function epdAuthHeaders(){
  try{
    var u=localStorage.getItem('epd_auth_u');
    var p=localStorage.getItem('epd_auth_p');
    if(u!=null&&p!=null&&u!==''&&p!=='')
      return {'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};
  }catch(e){}
  return {};
}
function epdFetchOpts(extra){
  extra=extra||{};
  var h=Object.assign({},epdAuthHeaders(),extra.headers||{});
  return Object.assign({},extra,{headers:h});
}
let items=[];

function log(msg,cls){
  const b=document.getElementById('logBox');
  const d=document.createElement('div');
  d.className=cls||'';
  d.textContent=new Date().toLocaleTimeString()+' '+msg;
  b.prepend(d);
}

function updateStat(){
  const done=items.filter(i=>i.done).length;
  const total=items.length;
  const pct=total?Math.round(done*100/total):0;
  document.getElementById('stat').textContent=pct+'%  '+done+'/'+total+' 已完成';
  const bar=document.getElementById('progBar');
  if(bar) bar.style.width=pct+'%';
}

function renderList(){
  const el=document.getElementById('list');
  el.innerHTML='';
  items.forEach((it,i)=>{
    const div=document.createElement('div');
    div.className='todo-item'+(it.done?' done':'');
    div.innerHTML=`
      <div class="todo-check${it.done?' checked':''}" onclick="toggleDone(${i})">${it.done?'<span class="msym">done</span>':''}</div>
      <div class="todo-text"><input value="${esc(it.text)}" onchange="items[${i}].text=this.value" maxlength="47"></div>
      <div class="todo-pri p${it.priority}" onclick="cyclePri(${i})">${['普通','重要','紧急'][it.priority]}</div>
      <div class="todo-del" onclick="delItem(${i})">×</div>
    `;
    el.appendChild(div);
  });
  updateStat();
}

function esc(s){return s.replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function toggleDone(i){items[i].done=!items[i].done;renderList();silentSave()}
function cyclePri(i){items[i].priority=(items[i].priority+1)%3;renderList();silentSave()}
function delItem(i){items.splice(i,1);renderList();silentSave()}

async function silentSave(){
  const body=JSON.stringify({enabled:document.getElementById('chkEnabled').checked,items});
  try{await fetch('/todo',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body}))}catch(e){}
}

function addItem(){
  const inp=document.getElementById('newText');
  const t=inp.value.trim();
  if(!t)return;
  if(items.length>=16){log('最多16条','bad');return}
  items.push({text:t,done:false,priority:0});
  inp.value='';
  renderList();
}

document.getElementById('newText').addEventListener('keydown',e=>{
  if(e.key==='Enter')addItem();
});

async function load(){
  try{
    const r=await fetch('/todo.json',epdFetchOpts({}));
    const j=await r.json();
    document.getElementById('chkEnabled').checked=j.enabled;
    items=j.items||[];
    renderList();
    log('配置已加载','ok');
  }catch(e){log('加载失败: '+e,'bad')}
}

async function save(){
  const body=JSON.stringify({
    enabled:document.getElementById('chkEnabled').checked,
    items:items
  });
  try{
    const r=await fetch('/todo',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body}));
    const j=await r.json();
    log(j.ok?'保存成功':'保存失败',j.ok?'ok':'bad');
  }catch(e){log('保存失败: '+e,'bad')}
}

async function showOnEpd(){
  log('正在推送到屏幕…');
  try{
    const r=await fetch('/todo_show',epdFetchOpts({method:'POST'}));
    const j=await r.json();
    log(j.ok?'显示成功':'显示失败: '+(j.msg||''),j.ok?'ok':'bad');
  }catch(e){log('推送失败: '+e,'bad')}
}

function clearDone(){
  const before=items.length;
  items=items.filter(i=>!i.done);
  renderList();
  log('清除了 '+(before-items.length)+' 条已完成项','ok');
}

load();
</script>
</body>
</html>
