<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>课程表 — 喵喵墨水屏</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body class="timetable">
<div class="wrap">
  <div class="hdr"><div><div class="title">课程表</div></div></div>
  <nav class="nav">
    <a href="/"><span class="msym sm">upload</span>上传</a>
    <a href="/gallery"><span class="msym sm">view_carousel</span>轮播</a>
    <a href="/weather"><span class="msym sm">cloud</span>天气</a>
    <a href="/clock"><span class="msym sm">schedule</span>时钟</a>
    <a href="/calendar"><span class="msym sm">calendar_month</span>日历</a>
    <a href="/timetable" class="active"><span class="msym sm">grid_on</span>课表</a>
    <a href="/todo"><span class="msym sm">check_box</span>待办</a>
    <a href="/countdown"><span class="msym sm">timer</span>倒计时</a>
    <a href="/message"><span class="msym sm">subject</span>文字</a>
    <a href="/board"><span class="msym sm">draw</span>画布</a>
    <a href="/codex"><span class="msym sm">monitoring</span>额度</a>
    <a href="/config"><span class="msym sm">settings</span>配置</a>
  </nav>
  <div class="card">
    <div class="hd">
      <div class="row">
        <span class="title" style="font-size:16px">总开关</span>
        <label class="toggle"><input type="checkbox" id="chkEnabled"><div class="track"><div class="thumb"></div></div></label>
      </div>
    </div>
    <div class="bd">
      <div class="row row-cfg">
        <label style="font-size:13px;font-weight:600">学期开始日期</label>
        <input type="date" id="inpSemStart" style="width:160px">
        <label style="font-size:13px;font-weight:600;margin-left:12px">显示天数</label>
        <select id="selDays"><option value="5">周一至周五</option><option value="7">周一至周日</option></select>
      </div>
      <div class="row" style="margin-top:6px">
        <span class="sub" id="weekInfo"></span>
      </div>
      <div class="row row-btns" style="margin-top:10px">
        <button class="btn" onclick="saveConfig()">保存配置</button>
        <button class="btn ghost" onclick="loadConfig()">重新加载</button>
        <select id="selShowDay" style="padding:8px 10px;border:1px solid var(--line);background:var(--sf);color:var(--tx);font-size:13px">
          <option value="-1">今天</option>
          <option value="0">周一</option>
          <option value="1">周二</option>
          <option value="2">周三</option>
          <option value="3">周四</option>
          <option value="4">周五</option>
          <option value="5">周六</option>
          <option value="6">周日</option>
        </select>
        <button class="btn ghost" onclick="showOnEpd()">推送到屏幕</button>
        <button class="btn ghost" onclick="exportTimetable()">导出</button>
        <label class="btn ghost" style="cursor:pointer">导入<input type="file" accept=".json" style="display:none" onchange="importTimetable(this)"></label>
        <button class="btn ghost" onclick="clearAll()" style="color:var(--er)">清空</button>
      </div>
      <div class="log" id="log">就绪。</div>
    </div>
  </div>

  <!-- period definitions -->
  <div class="card">
    <div class="hd">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="title" style="font-size:16px">节次时间</div><div class="sub">定义每节课的上下课时间（所有天共用）</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn sm ghost" onclick="addPeriod()">+ 添加节次</button>
          <button class="btn sm ghost" onclick="applyTemplate()">套用模板</button>
        </div>
    </div>
    </div>
    <div class="bd" id="periodList"></div>
  </div>

  <!-- grid -->
  <div class="card">
    <div class="hd"><div class="title" style="font-size:16px">课程安排</div><div class="sub">点击单元格添加或编辑课程。</div></div>
    <div class="bd" style="overflow-x:auto">
      <table class="tt-table" id="gridTable"></table>
    </div>
  </div>
  
</div>

<!-- edit modal -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">编辑课程</h3>
    <label>课程名称</label>
    <input type="text" id="mName" maxlength="39" placeholder="如：高等数学">
    <label>教室</label>
    <input type="text" id="mRoom" maxlength="19" placeholder="如：A101">
    <label>上课周次</label>
    <input type="text" id="mWeeks" placeholder="如：1-16 或 1,3,5,7 或留空=全部">
    <div class="sub" style="margin-top:4px">支持格式：1-16, 1,3,5,7-9, 留空表示每周都上</div>
    <div class="actions">
      <button class="btn ghost sm" onclick="deleteCell()" id="btnDel" style="color:var(--er);margin-right:auto">删除</button>
      <button class="btn ghost sm" onclick="closeModal()">取消</button>
      <button class="btn sm" onclick="saveCell()">确定</button>
    </div>
  </div>
</div>
  <footer class="epd-credit">MiaooAim  <a href="https://github.com/bluseliu50/MiaooAim_fork" target="_blank" rel="noopener">源码</a><br>forked by bluseliu50</footer>
</div>
<script>
function epdAuthHeaders(){
  try{
    var u=localStorage.getItem('epd_auth_u');
    var p=localStorage.getItem('epd_auth_p');
    if(u!=null&&p!=null&&u!==''&&p!=='')
      return {'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};
  }catch(e){}
  return {};
}
function epdFetchOpts(extra){
  extra=extra||{};
  var h=Object.assign({},epdAuthHeaders(),extra.headers||{});
  return Object.assign({},extra,{headers:h});
}
const DAYS=['一','二','三','四','五','六','日'];
let cfg={enabled:false,period_count:0,show_days:5,semester_start:0,periods:[],grid:[]};
let editDay=-1,editPeriod=-1;

function log(s,cls){const el=document.getElementById('log');el.className='log'+(cls?' '+cls:'');el.textContent=s}

function initGrid(){
  cfg.grid=[];
  for(let d=0;d<7;d++){
    cfg.grid[d]=[];
    for(let p=0;p<cfg.period_count;p++) cfg.grid[d][p]=null;
  }
}

function renderPeriods(){
  const el=document.getElementById('periodList');
  if(!cfg.periods||cfg.periods.length===0){el.innerHTML='<div class="sub">暂无节次，请点击「添加节次」或「套用模板」。</div>';return}
  el.innerHTML=cfg.periods.map((p,i)=>`
    <div class="period-row">
      <span>第${i+1}节</span>
      <input type="number" min="0" max="23" value="${p.start_hour}" onchange="updPeriod(${i},'start_hour',this.value)">:
      <input type="number" min="0" max="59" value="${p.start_minute}" onchange="updPeriod(${i},'start_minute',this.value)">
      <span style="margin:0 4px">—</span>
      <input type="number" min="0" max="23" value="${p.end_hour}" onchange="updPeriod(${i},'end_hour',this.value)">:
      <input type="number" min="0" max="59" value="${p.end_minute}" onchange="updPeriod(${i},'end_minute',this.value)">
      <button class="btn ghost sm" onclick="removePeriod(${i})" style="margin-left:auto;color:var(--er)">×</button>
    </div>`).join('');
}

function updPeriod(i,k,v){cfg.periods[i][k]=parseInt(v)||0;renderPeriods()}

function addPeriod(){
  let last=cfg.periods.length>0?cfg.periods[cfg.periods.length-1]:null;
  let sh=last?last.end_hour:8,sm=last?last.end_minute+10:0;
  if(sm>=60){sh++;sm-=60}
  cfg.periods.push({start_hour:sh,start_minute:sm,end_hour:sh,end_minute:sm+45>=60?sm+45-60:sm+45});
  if(sm+45>=60) cfg.periods[cfg.periods.length-1].end_hour++;
  cfg.period_count=cfg.periods.length;
  for(let d=0;d<7;d++){while(cfg.grid[d].length<cfg.period_count)cfg.grid[d].push(null)}
  renderPeriods();renderGrid();
}

function removePeriod(i){
  cfg.periods.splice(i,1);
  cfg.period_count=cfg.periods.length;
  for(let d=0;d<7;d++) cfg.grid[d].splice(i,1);
  renderPeriods();renderGrid();
}

function applyTemplate(){
  if(cfg.periods.length>0&&!confirm('将覆盖当前节次定义，确定？'))return;
  cfg.periods=[
    {start_hour:8,start_minute:0,end_hour:8,end_minute:45},
    {start_hour:8,start_minute:55,end_hour:9,end_minute:40},
    {start_hour:10,start_minute:0,end_hour:10,end_minute:45},
    {start_hour:10,start_minute:55,end_hour:11,end_minute:40},
    {start_hour:14,start_minute:0,end_hour:14,end_minute:45},
    {start_hour:14,start_minute:55,end_hour:15,end_minute:40},
    {start_hour:16,start_minute:0,end_hour:16,end_minute:45},
    {start_hour:16,start_minute:55,end_hour:17,end_minute:40},
    {start_hour:19,start_minute:0,end_hour:19,end_minute:45},
    {start_hour:19,start_minute:55,end_hour:20,end_minute:40},
  ];
  cfg.period_count=cfg.periods.length;
  for(let d=0;d<7;d++){cfg.grid[d]=[];for(let p=0;p<cfg.period_count;p++)cfg.grid[d].push(null)}
  renderPeriods();renderGrid();
  log('已套用标准10节模板','ok');
}

function renderGrid(){
  const cols=parseInt(document.getElementById('selDays').value)||5;
  let html='<thead><tr><th class="period-col">节次</th>';
  for(let d=0;d<cols;d++) html+=`<th>周${DAYS[d]}</th>`;
  html+='</tr></thead><tbody>';

  for(let p=0;p<cfg.period_count;p++){
    const pd=cfg.periods[p];
    const timeStr=`${String(pd.start_hour).padStart(2,'0')}:${String(pd.start_minute).padStart(2,'0')}`;
    html+=`<tr><td style="text-align:center;font-weight:700;background:var(--sf);font-size:12px"><div>${p+1}</div><div style="font-size:10px;color:var(--t2);font-weight:400">${timeStr}</div></td>`;
    for(let d=0;d<cols;d++){
      const c=cfg.grid[d]&&cfg.grid[d][p];
      if(c&&c.name){
        html+=`<td class="has-course" onclick="openModal(${d},${p})">
          <div class="cell-name">${esc(c.name)}</div>
          <div class="cell-room">${esc(c.room||'')}</div>
          <div class="cell-weeks">${esc(c.weeks||'')}</div></td>`;
      } else {
        html+=`<td onclick="openModal(${d},${p})"><div class="cell-empty">+</div></td>`;
      }
    }
    html+='</tr>';
  }
  html+='</tbody>';
  document.getElementById('gridTable').innerHTML=html;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function openModal(d,p){
  editDay=d;editPeriod=p;
  const c=cfg.grid[d]&&cfg.grid[d][p];
  document.getElementById('mName').value=c?c.name:'';
  document.getElementById('mRoom').value=c?c.room:'';
  document.getElementById('mWeeks').value=c?c.weeks||'':'';
  document.getElementById('btnDel').style.display=(c&&c.name)?'inline-block':'none';
  document.getElementById('modalTitle').textContent=`周${DAYS[d]} 第${p+1}节`;
  document.getElementById('modalBg').classList.add('active');
  document.getElementById('mName').focus();
}

function closeModal(){document.getElementById('modalBg').classList.remove('active');editDay=-1;editPeriod=-1}

function saveCell(){
  const name=document.getElementById('mName').value.trim();
  if(!name){deleteCell();return}
  if(!cfg.grid[editDay])cfg.grid[editDay]=[];
  cfg.grid[editDay][editPeriod]={
    name:name,
    room:document.getElementById('mRoom').value.trim(),
    weeks:document.getElementById('mWeeks').value.trim()
  };
  closeModal();renderGrid();
}

function deleteCell(){
  if(cfg.grid[editDay])cfg.grid[editDay][editPeriod]=null;
  closeModal();renderGrid();
}

function clearAll(){
  if(!confirm('确定清空所有课程？'))return;
  for(let d=0;d<7;d++){cfg.grid[d]=[];for(let p=0;p<cfg.period_count;p++)cfg.grid[d].push(null)}
  renderGrid();log('已清空','ok');
}

function exportTimetable(){
  try{
    var blob=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='timetable_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();URL.revokeObjectURL(a.href);
    log('课程表已导出','ok');
  }catch(e){log('导出失败：'+e,'bad');}
}

async function importTimetable(input){
  if(!input.files.length)return;
  try{
    var text=await input.files[0].text();
    var data=JSON.parse(text);
    if(!data.periods||!data.grid){log('JSON 格式无效，需包含 periods 和 grid 字段','bad');return;}
    cfg=data;
    renderPeriods();renderGrid();
    document.getElementById('chkEnabled').checked=!!cfg.enabled;
    if(cfg.semester_start)document.getElementById('inpSemStart').value=cfg.semester_start;
    if(cfg.days)document.getElementById('selDays').value=String(cfg.days);
    log('导入成功！请点击「保存配置」写入设备。','ok');
  }catch(e){log('导入失败：'+e,'bad');}
  input.value='';
}

function semesterStartToUnix(dateStr){
  if(!dateStr)return 0;
  const d=new Date(dateStr+'T00:00:00');
  const dow=d.getDay();
  const mondayOff=(dow===0)?-6:(1-dow);
  d.setDate(d.getDate()+mondayOff);
  return Math.floor(d.getTime()/1000);
}

function unixToDateStr(ts){
  if(!ts)return'';
  const d=new Date(ts*1000);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

async function loadConfig(){
  try{
    const r=await fetch('/timetable.json',epdFetchOpts({}));
    const j=await r.json();
    cfg.enabled=j.enabled||false;
    cfg.period_count=j.period_count||0;
    cfg.show_days=j.show_days||5;
    cfg.semester_start=j.semester_start||0;
    cfg.periods=j.periods||[];
    cfg.grid=j.grid||[];
    for(let d=0;d<7;d++){
      if(!cfg.grid[d])cfg.grid[d]=[];
      while(cfg.grid[d].length<cfg.period_count)cfg.grid[d].push(null);
    }
    document.getElementById('chkEnabled').checked=cfg.enabled;
    document.getElementById('inpSemStart').value=unixToDateStr(cfg.semester_start);
    document.getElementById('selDays').value=String(cfg.show_days);

    const cw=j.current_week||0;
    document.getElementById('weekInfo').textContent=cw>0?`当前：第${cw}周`:'学期周次未知（请设置开始日期并同步时间）';

    renderPeriods();renderGrid();
    log('配置已加载','ok');
  }catch(e){
    cfg.periods=[];cfg.period_count=0;
    for(let d=0;d<7;d++)cfg.grid[d]=[];
    renderPeriods();renderGrid();
    log('加载失败：'+e,'bad');
  }
}

async function saveConfig(){
  cfg.enabled=document.getElementById('chkEnabled').checked;
  cfg.show_days=parseInt(document.getElementById('selDays').value)||5;
  cfg.semester_start=semesterStartToUnix(document.getElementById('inpSemStart').value);
  cfg.period_count=cfg.periods.length;

  try{
    const r=await fetch('/timetable',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)}));
    const j=await r.json();
    log(j.ok?'保存成功！':'保存失败',j.ok?'ok':'bad');
  }catch(e){log('保存失败：'+e,'bad')}
}

async function showOnEpd(){
  const day=parseInt(document.getElementById('selShowDay').value);
  const label=day<0?'今天':['周一','周二','周三','周四','周五','周六','周日'][day];
  log('正在推送 '+label+' 课程到屏幕…');
  try{
    const body=day>=0?JSON.stringify({day}):undefined;
    const r=await fetch('/timetable_show',epdFetchOpts({method:'POST',
      headers:body?{'Content-Type':'application/json'}:{},
      body}));
    const j=await r.json();
    log(j.ok?label+' 显示成功':'显示失败：'+(j.msg||''),j.ok?'ok':'bad');
  }catch(e){log('推送失败：'+e,'bad')}
}

document.getElementById('selDays').addEventListener('change',renderGrid);
loadConfig();
</script>
</body>
</html>
