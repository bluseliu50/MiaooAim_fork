<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>时钟 — 喵喵墨水屏</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body class="page-clock">
<div class="wrap">
  <div class="hdr"><div><div class="title">时钟</div></div></div>
  <nav class="nav">
    <a href="/"><span class="msym sm">upload</span>上传</a>
    <a href="/gallery"><span class="msym sm">view_carousel</span>轮播</a>
    <a href="/weather"><span class="msym sm">cloud</span>天气</a>
    <a href="/clock" class="active"><span class="msym sm">schedule</span>时钟</a>
    <a href="/calendar"><span class="msym sm">calendar_month</span>日历</a>
    <a href="/timetable"><span class="msym sm">grid_on</span>课表</a>
    <a href="/todo"><span class="msym sm">check_box</span>待办</a>
    <a href="/countdown"><span class="msym sm">timer</span>倒计时</a>
    <a href="/message"><span class="msym sm">subject</span>文字</a>
    <a href="/board"><span class="msym sm">draw</span>画布</a>
    <a href="/codex"><span class="msym sm">monitoring</span>额度</a>
    <a href="/config"><span class="msym sm">settings</span>配置</a>
  </nav>
  <div class="card">
    <div class="hd"><div class="title">时钟表盘</div></div>
    <div class="bd">
      <div class="form-row"><label>时钟偏好</label>
        <label class="inline"><span class="toggle"><input type="checkbox" id="ckEnabled"><span class="sl"></span></span><span id="ckLabel">偏好关闭</span></label>
      </div>
      <div class="form-row"><label>显示天气摘要</label>
        <label class="inline"><span class="toggle"><input type="checkbox" id="ckWeather"><span class="sl"></span></span><span style="color:var(--t2);font-size:12px">在时间下方显示天气（需先配置天气）</span></label>
      </div>
      <div class="actions">
        <button class="btn" onclick="saveClock()">保存设置</button>
        <button class="btn ghost sm" onclick="showClock()">立即显示</button>
        <button class="btn ghost sm" onclick="loadClock()">刷新</button>
      </div>
      <div class="log" id="ckLog">加载中…</div>
    </div>
  </div>
  <footer class="epd-credit">MiaooAim  <a href="https://github.com/bluseliu50/MiaooAim_fork" target="_blank" rel="noopener">源码</a><br>forked by bluseliu50</footer>
</div>
<script>
function epdAuthHeaders(){try{var u=localStorage.getItem('epd_auth_u');var p=localStorage.getItem('epd_auth_p');if(u!=null&&p!=null&&u!==''&&p!=='')return{'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};}catch(e){}return{};}
function epdFetchOpts(extra){extra=extra||{};var h=Object.assign({},epdAuthHeaders(),extra.headers||{});return Object.assign({},extra,{headers:h});}
function ckLog(s,cls){const el=document.getElementById('ckLog');el.className='log'+(cls?' '+cls:'');el.textContent=s;}
async function loadClock(){try{const r=await fetch('/clock_config',epdFetchOpts());const j=await r.json();document.getElementById('ckEnabled').checked=j.enabled;document.getElementById('ckLabel').textContent=j.enabled?'偏好开启':'偏好关闭';document.getElementById('ckWeather').checked=j.show_weather;ckLog('设置已加载。');}catch(e){ckLog('加载失败: '+e,'bad');}}
async function saveClock(){const cfg={enabled:document.getElementById('ckEnabled').checked,style:0,show_weather:document.getElementById('ckWeather').checked};ckLog('保存中…');try{const r=await fetch('/clock_config',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)}));const j=await r.json();if(j.ok){ckLog('设置已保存。','ok');await loadClock();}else ckLog('保存失败','bad');}catch(e){ckLog('请求失败: '+e,'bad');}}
async function showClock(){ckLog('正在渲染时钟…请稍候（约 15 秒刷新）');try{const r=await fetch('/clock_show',epdFetchOpts({method:'POST'}));const j=await r.json();if(j.ok)ckLog('时钟已显示在墨水屏上！','ok');else ckLog('显示失败（可能时间尚未同步）','bad');}catch(e){ckLog('请求失败: '+e,'bad');}}
(function(){var ce=document.getElementById('ckEnabled');if(ce)ce.addEventListener('change',function(e){document.getElementById('ckLabel').textContent=e.target.checked?'偏好开启':'偏好关闭';});})();
loadClock();
</script>
</body>
</html>
