<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>天气 — 喵喵墨水屏</title>
<link rel="stylesheet" href="/app.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body class="weather">
<div class="wrap">
  <div class="hdr"><div><div class="title">天气</div></div></div>
  <nav class="nav">
    <a href="/"><span class="msym sm">upload</span>上传</a>
    <a href="/gallery"><span class="msym sm">view_carousel</span>轮播</a>
    <a href="/weather" class="active"><span class="msym sm">cloud</span>天气</a>
    <a href="/clock"><span class="msym sm">schedule</span>时钟</a>
    <a href="/calendar"><span class="msym sm">calendar_month</span>日历</a>
    <a href="/timetable"><span class="msym sm">grid_on</span>课表</a>
    <a href="/todo"><span class="msym sm">check_box</span>待办</a>
    <a href="/countdown"><span class="msym sm">timer</span>倒计时</a>
    <a href="/message"><span class="msym sm">subject</span>文字</a>
    <a href="/board"><span class="msym sm">draw</span>画布</a>
    <a href="/codex"><span class="msym sm">monitoring</span>额度</a>
    <a href="/config"><span class="msym sm">settings</span>配置</a>
  </nav>
  <div class="card">
    <div class="hd"><div class="title">天气显示</div></div>
    <div class="bd">
      <div class="kv"><div class="k">天气状态</div><div class="v" id="w_status">-</div><div class="k">最新数据</div><div class="v" id="w_data">-</div></div>
      <div class="form-row"><label>启用天气</label>
        <label class="inline"><span class="toggle"><input type="checkbox" id="wEnabled"><span class="sl"></span></span><span id="wLabel">已关闭</span></label>
      </div>
      <div class="field-group"><label>API Key（和风天气）</label><input type="text" id="wApiKey" placeholder="在 dev.qweather.com 获取"></div>
      <div class="field-group"><label>API Host（控制台 → 设置中查看）</label><input type="text" id="wApiHost" placeholder="xxx.re.qweatherapi.com"></div>
      <div class="form-row" style="position:relative"><label>搜索城市</label><input type="text" id="wCitySearch" placeholder="输入城市名，如：北京、杭州、浦东" autocomplete="off" oninput="searchCity(this.value)"><div id="cityResults" style="display:none;position:absolute;z-index:10;left:0;right:0;max-width:420px;max-height:200px;overflow-y:auto;background:var(--bg);border:1px solid var(--line);margin-top:2px"></div></div>
      <div class="field-group"><label>城市 Location ID</label><input type="text" id="wLocation" placeholder="101010100"></div>
      <div class="field-group"><label>城市名称（显示用）</label><input type="text" id="wCity" placeholder="北京"></div>
      <div class="field-group"><label>天气刷新策略</label><select id="wRefresh"><option value="0">仅手动</option><option value="30">自动：常开 30 分钟，低功耗按唤醒间隔</option></select></div>
      <div class="actions">
        <button class="btn" onclick="saveWeather()">保存设置</button>
        <button class="btn ghost sm" onclick="showWeather()">立即显示</button>
        <button class="btn ghost sm" onclick="loadWeather()">刷新</button>
      </div>
      <div class="log" id="wLog">加载中…</div>
    </div>
  </div>
  <footer class="epd-credit">MiaooAim  <a href="https://github.com/bluseliu50/MiaooAim_fork" target="_blank" rel="noopener">源码</a><br>forked by bluseliu50</footer>
</div>
<script>
function epdAuthHeaders(){try{var u=localStorage.getItem('epd_auth_u');var p=localStorage.getItem('epd_auth_p');if(u!=null&&p!=null&&u!==''&&p!=='')return {'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};}catch(e){}return {};}
function epdFetchOpts(extra){extra=extra||{};var h=Object.assign({},epdAuthHeaders(),extra.headers||{});return Object.assign({},extra,{headers:h});}

function wLog(s,cls){const el=document.getElementById('wLog');el.className='log'+(cls?' '+cls:'');el.textContent=s;}
async function fetchJsonRetry(url,options,retries,delayMs){retries=retries===undefined?4:retries;delayMs=delayMs===undefined?400:delayMs;let last;for(let i=0;i<retries;i++){try{const r=await fetch(url,epdFetchOpts(options));if(!r.ok) throw new Error('HTTP '+r.status);return await r.json();}catch(e){last=e;if(i<retries-1) await new Promise(function(res){setTimeout(res,delayMs*(i+1));});}}throw last;}
let weatherHydrating=false,weatherAutoSaveTimer=null,weatherSaveInFlight=false,weatherApiKeyConfigured=false;
var CITIES=[["北京","101010100"],["北京朝阳","101010300"],["北京海淀","101010200"],["上海","101020100"],["上海浦东","101021500"],["上海徐汇","101020600"],["广州","101280101"],["深圳","101280601"],["天津","101030100"],["重庆","101040100"],["杭州","101210101"],["南京","101190101"],["成都","101270101"],["武汉","101200101"],["西安","101110101"],["苏州","101190401"],["长沙","101250101"],["郑州","101180101"],["青岛","101120201"],["大连","101070201"],["沈阳","101070101"],["哈尔滨","101050101"],["长春","101060101"],["济南","101120101"],["合肥","101220101"],["福州","101230101"],["厦门","101230201"],["昆明","101290101"],["贵阳","101260101"],["南宁","101300101"],["南昌","101240101"],["太原","101100101"],["石家庄","101090101"],["呼和浩特","101080101"],["乌鲁木齐","101130101"],["兰州","101160101"],["银川","101170101"],["西宁","101150101"],["拉萨","101140101"],["海口","101310101"],["三亚","101310201"],["珠海","101280701"],["佛山","101280800"],["东莞","101281601"],["宁波","101210401"],["无锡","101190201"],["温州","101210701"],["常州","101191101"],["中山","101281701"],["惠州","101280301"],["烟台","101120501"],["潍坊","101120601"],["绍兴","101210501"],["台州","101210601"],["嘉兴","101210301"],["金华","101210901"],["泉州","101230501"],["保定","101090201"],["唐山","101090501"],["洛阳","101180901"],["襄阳","101200201"],["芜湖","101220301"],["徐州","101190801"],["扬州","101190601"],["南通","101190501"],["连云港","101190701"],["桂林","101300501"],["绵阳","101270401"],["遵义","101260201"],["柳州","101300301"],["香港","101320101"],["澳门","101330101"]];
function searchCity(q){var box=document.getElementById('cityResults');if(!q||q.length<1){box.style.display='none';return;}var results=CITIES.filter(function(c){return c[0].indexOf(q)>=0;});if(!results.length){box.style.display='none';return;}box.innerHTML=results.slice(0,10).map(function(c){return '<div style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--sb)" onclick="pickCity(\''+c[0]+'\',\''+c[1]+'\')">'+c[0]+' <span style="color:var(--t2);font-size:11px">'+c[1]+'</span></div>';}).join('');box.style.display='block';}
function pickCity(name,id){document.getElementById('wLocation').value=id;document.getElementById('wCity').value=name;document.getElementById('wCitySearch').value=name;document.getElementById('cityResults').style.display='none';}
document.addEventListener('click',function(e){if(!e.target.closest('#wCitySearch')&&!e.target.closest('#cityResults'))document.getElementById('cityResults').style.display='none';});
function collectWeatherCfg(){var cfg={enabled:document.getElementById('wEnabled').checked,api_key:document.getElementById('wApiKey').value.trim(),api_host:document.getElementById('wApiHost').value.trim().replace(/^https?:\/\//,''),location:document.getElementById('wLocation').value.trim(),city_name:document.getElementById('wCity').value.trim(),refresh_min:parseInt(document.getElementById('wRefresh').value)};if(!cfg.api_key&&weatherApiKeyConfigured) delete cfg.api_key;return cfg;}
function scheduleWeatherAutoSave(){if(weatherHydrating||weatherSaveInFlight) return;clearTimeout(weatherAutoSaveTimer);weatherAutoSaveTimer=setTimeout(function(){weatherAutoSaveTimer=null;var cfg=collectWeatherCfg();if(cfg.enabled&&(!(cfg.api_key||weatherApiKeyConfigured)||!cfg.api_host||!cfg.location)) return;saveWeather({silent:true});},2000);}
async function loadWeather(){try{weatherHydrating=true;const j=await fetchJsonRetry('/weather_config');weatherApiKeyConfigured=!!j.api_key_set;document.getElementById('wEnabled').checked=j.enabled;document.getElementById('wLabel').textContent=j.enabled?'已开启':'已关闭';document.getElementById('wApiKey').value=j.api_key||'';document.getElementById('wApiKey').placeholder=weatherApiKeyConfigured?'已保存，留空不修改':'和风天气 API Key';document.getElementById('wApiHost').value=j.api_host||'';document.getElementById('wLocation').value=j.location||'';document.getElementById('wCity').value=j.city_name||'';document.getElementById('wRefresh').value=String(j.refresh_min?30:0);const st=document.getElementById('w_status');if(j.enabled){st.textContent='运行中';st.className='v ok';}else{st.textContent='已关闭';st.className='v warn';}const wd=document.getElementById('w_data');if(j.has_data){wd.textContent=j.temp+'°C '+j.text+' ('+j.update_time+')';wd.className='v';}else{wd.textContent='暂无数据';wd.className='v warn';}wLog('设置已加载。');}catch(e){wLog('加载失败: '+e,'bad');}finally{weatherHydrating=false;}}
async function saveWeather(opts){opts=opts||{};var silent=opts.silent===true;var cfg=collectWeatherCfg();if(cfg.enabled&&(!(cfg.api_key||weatherApiKeyConfigured)||!cfg.api_host||!cfg.location)){if(!silent) wLog('请填写 API Key、API Host 和城市 ID','bad');return;}wLog(silent?'自动保存中…':'保存中…');weatherSaveInFlight=true;try{var j=await fetchJsonRetry('/weather_config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)},3,500);if(j.ok){wLog(silent?'已自动保存，设备正在拉取天气…':'设置已保存。设备将自动拉取天气。','ok');await loadWeather();}else wLog('保存失败','bad');}catch(e){wLog('请求失败: '+e,'bad');}finally{weatherSaveInFlight=false;}}
async function showWeather(){wLog('正在获取天气数据并渲染…墨水屏较慢，请耐心等待（最长约 2 分钟）');var ctrl=new AbortController();var t=setTimeout(function(){ctrl.abort();},120000);try{const r=await fetch('/weather_show',epdFetchOpts({method:'POST',signal:ctrl.signal}));const j=await r.json();if(j.ok){wLog('天气已显示在墨水屏上！','ok');await loadWeather();}else wLog('获取天气失败，请检查 API Key 和城市 ID 是否正确。','bad');}catch(e){wLog('请求失败: '+(e.name==='AbortError'?'超时（墨水屏仍在刷新可稍后再试）':e),'bad');}finally{clearTimeout(t);}}
(function(){['wEnabled','wApiKey','wApiHost','wLocation','wCity','wRefresh'].forEach(function(id){var el=document.getElementById(id);if(!el) return;var ev=(el.tagName==='SELECT'||el.type==='checkbox')?'change':'input';el.addEventListener(ev,function(){if(id==='wEnabled')document.getElementById('wLabel').textContent=el.checked?'已开启':'已关闭';scheduleWeatherAutoSave();});});})();
loadWeather();
</script>
</body>
</html>
